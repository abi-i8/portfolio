<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Crisp, high-contrast gradients tailored for micro resolutions -->
    <radialGradient id="headGrad" cx="30%" cy="15%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#f0f4fc" />
      <stop offset="100%" stop-color="#abb9cf" />
    </radialGradient>
    <radialGradient id="visorGrad" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#14142b" />
      <stop offset="90%" stop-color="#000000" />
    </radialGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#bbf6ff" />
      <stop offset="50%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#0088cc" />
    </radialGradient>
    <filter id="eyeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Clean, high-impact transparent background - EVE's head fills 95% of the frame! -->

  <!-- EVE's Head Outer Shell (Slightly outlined with deep silver stroke to maintain 100% visibility on light-themed browser tabs) -->
  <path d="M 20 220 C 20 60, 492 60, 492 220 C 492 345, 430 395, 256 395 C 82 395, 20 345, 20 220 Z" 
        fill="url(#headGrad)" 
        stroke="#94a6c0" 
        stroke-width="10"
        filter="drop-shadow(0px 14px 20px rgba(0,0,0,0.35))" />

  <!-- EVE's Visor (Futuristic Sweeping Black Faceplate - Zoomed in) -->
  <path d="M 52 220 C 52 98, 460 98, 460 220 C 460 305, 410 348, 256 348 C 102 348, 52 305, 52 220 Z" 
        fill="url(#visorGrad)" />

  <!-- EVE's Glowing Eyes (Enlarged X2 to be highly prominent and recognizable at 16x16px scale!) -->
  <ellipse cx="172" cy="212" rx="46" ry="40" fill="url(#eyeGrad)" filter="url(#eyeGlow)" />
  <ellipse cx="340" cy="212" rx="46" ry="40" fill="url(#eyeGrad)" filter="url(#eyeGlow)" />

  <!-- Visor Reflection Detail -->
  <path d="M 70 195 C 120 155, 392 155, 442 195 C 380 170, 132 170, 70 195 Z" fill="#ffffff" opacity="0.1" />
</svg>
